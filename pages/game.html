<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="shortcut icon" href="../assets/favicon.png" type="image/x-icon">
    <title>Stardew Birthday</title>
</head>
<body id="tavern-body">
    <img id="lindsay-sprite" src="../assets/lindsay-sprite.png" />
    <img id="aaron-sprite" src="../assets/aaron-sprite.png" />

    <!-- Hotspots for clicking -->
    <div class="hotspot" data-person="Mayor Lewis"></div>
    <div class="hotspot" data-person="Aaron"></div>
    <div class="hotspot" data-person="Emily"></div>
    <div class="hotspot" data-person="Gus"></div>
    <div class="hotspot" data-person="Elliot"></div>
    <div class="hotspot" data-person="Sebastian"></div>
    <div class="hotspot" data-person="Marnie"></div>
    <div class="hotspot" data-person="Willy"></div>
    <div class="hotspot" data-person="Shane"></div>
    <div class="hotspot" data-person="Pam"></div>
    <div class="hotspot" data-person="Demetrius"></div>
    <div class="hotspot" data-person="Robin"></div>
    <div class="hotspot" data-person="Pierre"></div>

    <!-- Dialog box -->
    <div class="dialog-box" id="dialog-box">
        <div class="dialog-content">
            <p class="dialog-text" id="dialog-text"></p>
        </div>
        <div class="dialog-portrait-wrapper">
            <img class="dialog-portrait" id="dialog-portrait" src="" alt="" />
            <p class="dialog-name" id="dialog-name"></p>
        </div>
    </div>

    <script src="../scripts/partyscripts.js"></script>
</body>
</html>
